<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教主專用！嘟嘟臉惡作劇【Vercel完全體・五維智慧篩選動態精算版】</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #fcf8f2;
            -webkit-tap-highlight-color: transparent;
        }
        .char-btn { 
            transition: all 0.12s cubic-bezier(0.4, 0, 0.2, 1); 
            user-select: none;
            touch-action: manipulation;
        }
        .char-btn:active {
            transform: scale(0.94);
        }
        .char-avatar {
            transition: transform 0.2s ease;
        }
        .char-card-wrapper:hover .char-avatar {
            transform: scale(1.06);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #fcf8f2; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    </style>
</head>
<body class="p-3 sm:p-6 md:p-8 bg-[#fcf8f2] text-gray-800">

    <div class="max-w-7xl mx-auto">
        
        <header class="bg-gradient-to-r from-amber-100 via-yellow-100 to-orange-100 rounded-2xl p-4 sm:p-6 shadow-md mb-6 border-4 border-amber-400 flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="text-center lg:text-left">
                <h1 class="text-2xl sm:text-3xl font-bold text-amber-900 mb-1">🖍️ 著色板金格觀測站 (Vercel 完全體版)</h1>
                <p class="text-amber-800 text-xs sm:text-sm">已全面啟用 Google Popup 彈出式安全登入，支援跨裝置雲端資料即時同步</p>
            </div>
            
            <div id="authPanel" class="w-full lg:w-auto bg-white/80 p-3 rounded-xl border border-amber-300 shadow-sm flex flex-row items-center justify-between sm:justify-start gap-3">
                <div id="userStatus" class="text-left text-[11px] sm:text-xs text-gray-600">
                    <span class="block font-bold text-amber-800">當前狀態：單機模式</span>
                    <span>紀錄保存在此裝置</span>
                </div>
                <button id="authBtn" onclick="handleAuth()" class="bg-white hover:bg-gray-50 text-gray-700 font-bold py-2 px-3 sm:px-4 border border-gray-300 rounded-lg shadow-sm flex items-center gap-2 text-xs sm:text-sm transition shrink-0">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_android_loupe_60dp.png" class="w-4 h-4" alt="G">
                    <span>Google 帳號登入</span>
                </button>
            </div>
        </header>

        <div id="errorBanner" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded-xl mb-6 text-xs sm:text-sm font-bold text-center"></div>

        <section class="bg-white rounded-2xl p-4 shadow border-2 border-amber-200/80 mb-6 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <h3 class="font-bold text-amber-955 text-sm flex items-center gap-1">🔍 智慧使者多維度篩選器</h3>
                <button onclick="resetFilters()" class="text-xs text-amber-700 hover:text-amber-900 font-bold bg-amber-50 px-2 py-1 rounded border border-amber-200 transition">重置全部篩選</button>
            </div>
            
            <div class="space-y-2 text-xs">
                <div class="flex items-start gap-2 flex-wrap sm:flex-nowrap">
                    <span class="font-bold text-gray-500 shrink-0 w-16 pt-1">🔮 角色性格：</span>
                    <div id="filter_personality" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div class="flex items-start gap-2 flex-wrap sm:flex-nowrap">
                    <span class="font-bold text-gray-500 shrink-0 w-16 pt-1">🧬 角色種族：</span>
                    <div id="filter_race" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div class="flex items-start gap-2 flex-wrap sm:flex-nowrap">
                    <span class="font-bold text-gray-500 shrink-0 w-16 pt-1">🗺️ 角色站位：</span>
                    <div id="filter_position" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div class="flex items-start gap-2 flex-wrap sm:flex-nowrap">
                    <span class="font-bold text-gray-500 shrink-0 w-16 pt-1">⚔️ 角色職業：</span>
                    <div id="filter_job" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div class="flex flex-col sm:flex-row items-start gap-2 border-t border-dashed border-gray-100 pt-2">
                    <span class="font-bold text-amber-800 shrink-0 w-16 pt-1 flex items-center gap-0.5">🖍️ 金格屬性：</span>
                    <div class="flex flex-col gap-2 w-full">
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="text-[11px] text-gray-400 font-medium bg-gray-50 px-1 rounded">指定層級:</span>
                            <div id="filter_gridLayer" class="flex gap-1"></div>
                        </div>
                        <div class="flex items-center gap-1.5 flex-wrap">
                            <span class="text-[11px] text-gray-400 font-medium bg-gray-50 px-1 rounded">格子種類:</span>
                            <div id="filter_gridType" class="flex gap-1.5 flex-wrap"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6">
            <div class="bg-white rounded-xl p-3 sm:p-4 shadow border-2 border-amber-200 flex flex-col justify-between">
                <div class="border-b border-amber-100 pb-1.5 mb-1.5">
                    <h3 class="font-bold text-amber-900 flex items-center text-xs sm:text-sm">🥇 第一層統計</h3>
                    <span class="text-[9px] sm:text-[10px] text-amber-600 font-medium">(2枝金蠟筆 / 全員 +3%)</span>
                </div>
                <div class="space-y-1 text-[11px] sm:text-xs text-gray-700">
                    <p>已開：<span id="l1_opened" class="font-bold text-green-600 text-xs sm:text-sm">0</span> / <span id="l1_total" class="font-bold">0</span> 格</p>
                    <p>未開：<span id="l1_closed" class="font-bold text-amber-600 text
