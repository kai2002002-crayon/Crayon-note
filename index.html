<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>著色板金格觀測站【穩定修正版】</title>
    <script src="https://cdn.tailwindcss.com"></script>
    </head>
<body class="p-3 bg-[#fcf8f2] text-gray-800">
    <div class="max-w-7xl mx-auto">
        <main id="matrixContainer" class="space-y-6"></main>
    </div>

    <script>
        // 1. 確保每一行都正確閉合，尤其是泰達那一行
        const IMAGE_MAP = {
            // ... (請確保您的圖片連結正確)
            "avatar_泰達": "https://i.postimg.cc/vH2GKCw8/tai-da.png"
        };

        const INITIAL_DATA = [
            // ... (您校對過後的全部名單)
        ];

        // 2. 這是修正後的篩選器產生函數，保證順序並避免空白崩潰
        function buildFilterPanel() {
            const posOrder = ["前排", "中排", "後排"];
            const posContainer = document.getElementById('filter_position');
            if (!posContainer) return;
            
            posContainer.innerHTML = ""; // 清空舊內容
            
            // 加入「全部」按鈕
            const allBtn = document.createElement("button");
            allBtn.innerText = "全部";
            allBtn.className = "px-2 py-0.5 rounded border text-[11px] font-bold transition bg-amber-500 text-white border-amber-600 shadow-sm";
            allBtn.onclick = () => selectFilter("position", "");
            posContainer.appendChild(allBtn);

            // 強制依照 [前, 中, 後] 順序生成
            posOrder.forEach(pos => {
                const btn = document.createElement("button");
                btn.className = "inline-flex items-center gap-1 px-2 py-0.5 rounded border text-[11px] font-medium transition bg-gray-100 text-gray-700 border-gray-300 hover:bg-gray-200";
                btn.innerText = pos;
                btn.onclick = () => selectFilter("position", pos);
                posContainer.appendChild(btn);
            });
        }

        // 3. 確保啟動流程穩定
        try {
            initStates();
            initCrayonLogo();
            buildFilterPanel(); // 這裡現在會乖乖照順序排
            renderMatrix();
            calculateStats();
        } catch (e) {
            console.error("載入失敗，請檢查名單格式:", e);
        }
        
        // (其餘 Firebase 邏輯保持不變)
    </script>
</body>
</html>
